<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="titleMoonwake">
  <title id="titleMoonwake">Moonwake Harbor DnD Grid Map</title>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
