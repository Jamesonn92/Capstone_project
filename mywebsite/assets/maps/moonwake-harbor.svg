    <linearGradient id="water" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#284b66" />
      <stop offset="100%" stop-color="#1a3548" />
    </linearGradient>
    <linearGradient id="dock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5d4a38" />
      <stop offset="100%" stop-color="#3e2e20" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="#172839" />
  <rect width="1200" height="900" fill="url(#water)" opacity="0.95" />
  <rect width="1200" height="900" fill="url(#grid)" opacity="0.25" />
  <rect x="180" y="140" width="420" height="620" rx="16" fill="url(#dock)" />
  <rect x="600" y="240" width="380" height="520" rx="16" fill="url(#dock)" />
  <rect x="260" y="180" width="280" height="100" rx="12" fill="#4f3d2f" />
  <rect x="610" y="260" width="220" height="90" rx="12" fill="#4f3d2f" />
  <g fill="#3a5971" opacity="0.85">
    <path d="M600 420 C660 410 740 430 800 390 L820 450 C760 470 680 460 600 430 Z" />
    <path d="M500 720 C520 730 540 740 560 738 C580 736 600 728 620 720 C640 712 660 700 680 690 C700 680 720 672 740 668 C760 664 780 666 800 670 L820 680 Q780 700 760 710 Q720 725 700 730 Q660 735 620 734 Q580 733 540 726 Q510 720 500 720 Z" />
  </g>
  <rect x="190" y="430" width="120" height="90" rx="10" fill="#8a6f4f" />
  <rect x="430" y="580" width="110" height="80" rx="10" fill="#8a6f4f" />
  <rect x="760" y="360" width="110" height="80" rx="10" fill="#8a6f4f" />
  <rect x="930" y="440" width="110" height="80" rx="10" fill="#8a6f4f" />
