<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="titleEmberfall">
  <title id="titleEmberfall">Emberfall Forge DnD Grid Map</title>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="#4b3b2d" stroke-width="1" />
    </pattern>
    <linearGradient id="lava" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c65318" />
      <stop offset="100%" stop-color="#8a1e1f" />
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a4d42" />
      <stop offset="100%" stop-color="#3b3127" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="#261a14" />
  <rect width="1200" height="900" fill="url(#metal)" opacity="0.95" />
  <rect width="1200" height="900" fill="url(#grid)" opacity="0.28" />
  <rect x="200" y="140" width="380" height="620" rx="16" fill="#3c2f25" />
  <rect x="620" y="160" width="340" height="640" rx="16" fill="#3c2f25" />
  <rect x="420" y="320" width="160" height="260" rx="20" fill="url(#lava)" />
  <path d="M620 210 L760 210 L780 280 L740 300 L620 300 Z" fill="#50413a" />
  <rect x="240" y="220" width="120" height="90" rx="12" fill="#66513f" />
  <rect x="260" y="520" width="150" height="110" rx="12" fill="#66513f" />
  <circle cx="720" cy="380" r="34" fill="#a94a15" />
  <rect x="680" y="520" width="160" height="90" rx="12" fill="#66513f" />
  <rect x="780" y="500" width="80" height="180" rx="12" fill="rgba(255, 104, 16, 0.55)" />
  <text x="600" y="870" fill="#d3b090" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">Grid Scale: 5 ft per square</text>
</svg>
