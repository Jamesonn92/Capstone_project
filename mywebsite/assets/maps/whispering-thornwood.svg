<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="titleWhispering">
  <title id="titleWhispering">Whispering Thornwood DnD Grid Map</title>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="#444" stroke-width="1" />
    </pattern>
    <linearGradient id="forest" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a4d2b" />
      <stop offset="100%" stop-color="#1d3a27" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8fb07f" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#234024" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="#1c331f" />
  <rect width="1200" height="900" fill="url(#forest)" opacity="0.9" />
  <rect width="1200" height="900" fill="url(#grid)" opacity="0.35" />
  <rect x="220" y="140" width="760" height="620" rx="20" fill="rgba(42, 86, 48, 0.35)" />
  <circle cx="600" cy="320" r="120" fill="url(#glow)" />
  <path d="M260 180 C310 140 430 120 520 180 S760 260 880 210" fill="none" stroke="#7a8c5f" stroke-width="18" stroke-linecap="round" />
  <path d="M265 190 C315 240 345 310 305 370 S215 540 255 640" fill="none" stroke="#5a743f" stroke-width="22" stroke-linecap="round" />
  <path d="M930 190 C880 240 840 310 880 370 S980 540 940 640" fill="none" stroke="#5a743f" stroke-width="22" stroke-linecap="round" />
  <g fill="#334d2a" opacity="0.95">
    <ellipse cx="190" cy="180" rx="48" ry="32" />
    <ellipse cx="275" cy="240" rx="42" ry="30" />
    <ellipse cx="345" cy="185" rx="35" ry="28" />
    <ellipse cx="930" cy="220" rx="50" ry="35" />
    <ellipse cx="980" cy="340" rx="55" ry="36" />
    <ellipse cx="740" cy="680" rx="70" ry="45" />
  </g>
  <rect x="520" y="520" width="160" height="100" rx="18" fill="#5c4d29" />
  <rect x="540" y="535" width="120" height="70" rx="12" fill="#3d2f1c" />
  <circle cx="600" cy="560" r="28" fill="#8d7b4d" />
  <text x="600" y="865" fill="#c3d7a7" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">Grid Scale: 5 ft per square</text>
